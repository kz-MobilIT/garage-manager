<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}整備予約・顧客管理アプリ{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Garage Manager</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'home' %}">ホーム</a>
                <a class="nav-link" href="{% url 'customer_list' %}">顧客一覧</a>
                <a class="nav-link" href="{% url 'customer_create' %}">顧客登録</a>
                <a class="nav-link" href="{% url 'vehicle_list' %}">車両一覧</a>
                <a class="nav-link" href="{% url 'vehicle_create' %}">車両登録</a>
                <a class="nav-link" href="{% url 'reservation_list' %}">予約一覧</a>
                <a class="nav-link" href="{% url 'reservation_create' %}">予約登録</a>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
